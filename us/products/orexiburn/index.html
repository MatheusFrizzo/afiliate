<!-- ================= CHATWOOT ================= -->
<script>
window.chatwootSettings = {
  position: "right",
  type: "expanded_bubble",
  launcherTitle: "Falar com especialista"
};

(function(d,t){

  const BASE_URL = "https://chatwoot.thrivedaily.cloud";

  const g = d.createElement(t);
  const s = d.getElementsByTagName(t)[0];

  g.src = BASE_URL + "/packs/js/sdk.js";
  g.async = true;

  s.parentNode.insertBefore(g, s);

  g.onload = function(){

    window.chatwootSDK.run({
      websiteToken: "yVwngs1Aw1hZ7LLGyFHzVJCL",
      baseUrl: BASE_URL
    });

    initChat();

  };

  function initChat(){

    if (!window.$chatwoot){
      setTimeout(initChat, 300);
      return;
    }

    const visitorId = localStorage.getItem("visitor_id") || generateVisitorId();
    const product = document.body.dataset.produto || "unknown";

    // 👤 IDENTIDADE
    window.$chatwoot.setUser(visitorId, {
      name: "Visitor " + visitorId,
      email: visitorId + "@tracker.local"
    });

    // 📊 CONTEXTO (OURO PARA IA)
    window.$chatwoot.setCustomAttributes({
      product: product,
      visitor_id: visitorId,
      page: window.location.pathname,
      referrer: document.referrer,
      utm_source: getParam("utm_source"),
      utm_campaign: getParam("utm_campaign"),
      utm_medium: getParam("utm_medium")
    });

    // 🔥 ABERTURA INTELIGENTE
    if (getParam("utm_source")) {
      setTimeout(() => {
        window.$chatwoot.toggle("open");
      }, 6000);
    }

  }

  function getParam(name){
    return new URLSearchParams(window.location.search).get(name);
  }

  function generateVisitorId(){
    const id = "v_" + Math.random().toString(36).substring(2,12);
    localStorage.setItem("visitor_id", id);
    return id;
  }

})(document,"script");
</script>
