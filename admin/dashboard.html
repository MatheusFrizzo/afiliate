<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thrive Daily | Intelligence Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: linear-gradient(to bottom right, #0f172a, #1e293b);
}
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}
</style>
</head>

<body class="text-white font-sans">

<header class="bg-indigo-700 py-6 shadow-xl">
    <div class="max-w-7xl mx-auto px-6 flex justify-between">
        <h1 class="text-2xl font-bold">Thrive Daily Intelligence</h1>
        <a href="../index.html" class="hover:underline">Back</a>
    </div>
</header>

<section class="max-w-7xl mx-auto px-6 py-10">

<!-- KPI GRID -->
<div class="grid md:grid-cols-5 gap-6 mb-10">

<div class="card p-6 rounded-xl text-center">
<p class="text-sm text-slate-300">Total Access</p>
<p id="totalAccess" class="text-3xl font-bold text-indigo-400">-</p>
</div>

<div class="card p-6 rounded-xl text-center">
<p class="text-sm text-slate-300">Unique Visitors</p>
<p id="uniqueVisitors" class="text-3xl font-bold text-indigo-400">-</p>
</div>

<div class="card p-6 rounded-xl text-center">
<p class="text-sm text-slate-300">Unique IPs</p>
<p id="uniqueIPs" class="text-3xl font-bold text-indigo-400">-</p>
</div>

<div class="card p-6 rounded-xl text-center">
<p class="text-sm text-slate-300">Active Cities</p>
<p id="activeCities" class="text-3xl font-bold text-indigo-400">-</p>
</div>

<div class="card p-6 rounded-xl text-center">
<p class="text-sm text-slate-300">Return Rate</p>
<p id="returnRate" class="text-3xl font-bold text-indigo-400">-</p>
</div>

</div>

<!-- CHARTS -->
<div class="grid md:grid-cols-2 gap-8 mb-10">

<div class="card p-6 rounded-xl">
<h3 class="mb-4 font-bold">Access by City</h3>
<canvas id="cityChart"></canvas>
</div>

<div class="card p-6 rounded-xl">
<h3 class="mb-4 font-bold">Access by Product/Page</h3>
<canvas id="productChart"></canvas>
</div>

</div>

<!-- TABLES -->
<div class="grid md:grid-cols-2 gap-8">

<div class="card p-6 rounded-xl">
<h3 class="mb-4 font-bold">Top ISPs</h3>
<div id="ispTable"></div>
</div>

<div class="card p-6 rounded-xl">
<h3 class="mb-4 font-bold">Top IPs</h3>
<div id="ipTable"></div>
</div>

</div>

</section>

<script>

const API_URL = "https://n8n.thrivedaily.cloud/webhook/dash";

fetch(API_URL)
.then(res => res.json())
.then(data => {

const analytics = Array.isArray(data) ? data[0] : data;

document.getElementById("totalAccess").innerText = analytics.total_access;
document.getElementById("uniqueVisitors").innerText = analytics.unique_visitors;

document.getElementById("uniqueIPs").innerText =
Object.keys(analytics.by_ip || {}).length;

document.getElementById("activeCities").innerText =
Object.keys(analytics.by_city || {}).length;

let returnRate =
((analytics.total_access - analytics.unique_visitors) / analytics.total_access) * 100;

document.getElementById("returnRate").innerText =
returnRate.toFixed(1) + "%";

// CITY CHART
new Chart(document.getElementById("cityChart"), {
type: 'bar',
data: {
labels: Object.keys(analytics.by_city || {}),
datasets: [{
label: 'Access',
data: Object.values(analytics.by_city || {})
}]
}
});

// PRODUCT CHART
new Chart(document.getElementById("productChart"), {
type: 'doughnut',
data: {
labels: Object.keys(analytics.by_product || {}),
datasets: [{
data: Object.values(analytics.by_product || {})
}]
}
});

// ISP TABLE
if (analytics.by_org) {
let ispHTML = "<table class='w-full text-sm'>";
Object.entries(analytics.by_org)
.sort((a,b)=>b[1]-a[1])
.forEach(([org,count])=>{
ispHTML += `<tr><td class='py-1'>${org}</td><td class='text-right'>${count}</td></tr>`;
});
ispHTML += "</table>";
document.getElementById("ispTable").innerHTML = ispHTML;
}

// IP TABLE
let ipHTML = "<table class='w-full text-sm'>";
Object.entries(analytics.by_ip || {})
.sort((a,b)=>b[1]-a[1])
.forEach(([ip,count])=>{
ipHTML += `<tr><td class='py-1'>${ip}</td><td class='text-right'>${count}</td></tr>`;
});
ipHTML += "</table>";
document.getElementById("ipTable").innerHTML = ipHTML;

})
.catch(err => console.log(err));

</script>

</body>
</html>
